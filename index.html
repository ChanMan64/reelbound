<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#081b2c"><meta name="apple-mobile-web-app-capable" content="yes"><title>Reelbound</title><link rel="stylesheet" href="style.css"></head>
<body><main class="shell"><header><div><span class="eyebrow">A TIDE & TACKLE ADVENTURE</span><h1>REELBOUND</h1></div><button id="sound" aria-label="Toggle sound">SOUND: ON</button></header>
<section class="game-frame"><canvas id="game" width="960" height="540" tabindex="0" aria-label="Reelbound platform game"></canvas>
<div id="overlay" class="overlay"><div class="panel"><p class="kicker">THE CATCH AWAITS</p><h2 id="overlay-title">Reelbound</h2><p id="overlay-copy">Three full-length voyages built for expressive movement.</p><button id="primary">CAST OFF</button><div class="level-select"><button data-level="0">1 SHIPYARD</button><button data-level="1">2 GROTTO</button><button data-level="2">3 SUMMIT</button></div><p class="controls">MOVE <b>WASD / ARROWS</b> · JUMP <b>SPACE / Z</b> · CAST <b>E / X</b> · DASH <b>SHIFT / C</b> · RESTART <b>R</b> · PAUSE <b>ESC</b></p></div></div>
<div class="touch-controls" aria-label="Touch controls"><div class="touch-dpad"><button data-key="KeyA">◀</button><button data-key="KeyS">▼</button><button data-key="KeyD">▶</button></div><div class="touch-actions"><button data-key="KeyE">CAST</button><button data-key="Space">JUMP</button><button data-key="ShiftLeft">DASH</button></div></div></section>
<footer><span>Three full-length voyages</span><span>Movement is the main event</span><span>Progress saves locally</span></footer></main><script type="module" src="src/game.js"></script></body></html>
