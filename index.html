<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#081b2c">
  <title>Reelbound</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header>
      <div><span class="eyebrow">A TIDE & TACKLE ADVENTURE</span><h1>REELBOUND</h1></div>
      <button id="sound" aria-label="Toggle sound">SOUND: ON</button>
    </header>
    <section class="game-frame">
      <canvas id="game" width="960" height="540" aria-label="Reelbound platform game"></canvas>
      <div id="overlay" class="overlay">
        <div class="panel">
          <p class="kicker">THE CATCH AWAITS</p>
          <h2 id="overlay-title">Reelbound</h2>
          <p id="overlay-copy">Run the coast. Master the line. Catch five legendary fish.</p>
          <button id="primary">CAST OFF</button>
          <p class="controls">MOVE <b>A D / ← →</b> · JUMP <b>SPACE</b> · CAST <b>E / X</b> · DASH <b>SHIFT</b> · PAUSE <b>ESC</b></p>
        </div>
      </div>
    </section>
    <footer><span>Five handcrafted stages</span><span>Best played with headphones</span><span id="save-status">Progress saves locally</span></footer>
  </main>
  <script type="module" src="src/game.js"></script>
</body>
</html>
